<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日记 - Thoughts</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.8;
            color: #333;
            background: #f5f5f5;
        }
        .nav {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }
        .nav a {
            color: #3498db;
            text-decoration: none;
            margin-right: 15px;
        }
        .nav a:hover { text-decoration: underline; }
        
        .content {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        /* Markdown 样式 */
        .content h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        .content h2 { color: #34495e; margin-top: 30px; margin-bottom: 15px; }
        .content h3 { color: #555; margin-top: 20px; margin-bottom: 10px; }
        .content p { margin-bottom: 15px; text-align: justify; }
        .content blockquote {
            border-left: 4px solid #3498db;
            padding-left: 20px;
            margin: 20px 0;
            color: #666;
            font-style: italic;
        }
        .content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        .content pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin: 15px 0;
        }
        .content ul, .content ol { margin: 15px 0; padding-left: 30px; }
        .content li { margin: 5px 0; }
        .content hr { border: none; border-top: 1px solid #ddd; margin: 30px 0; }
        
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { color: #e74c3c; padding: 20px; background: #fee; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="../">← 返回首页</a>
        <a href="./">所有日记</a>
    </div>
    
    <div class="content" id="content">
        <div class="loading">加载中...</div>
    </div>
    
    <script>
        // 获取 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const filename = urlParams.get('file') || window.location.pathname.split('/').pop().replace('.html', '.md');
        
        // 加载对应的 .md 文件
        async function loadContent() {
            const contentDiv = document.getElementById('content');
            
            try {
                const mdUrl = './' + filename;
                const response = await fetch(mdUrl);
                
                if (!response.ok) {
                    throw new Error('文件不存在');
                }
                
                const markdown = await response.text();
                const html = marked.parse(markdown);
                contentDiv.innerHTML = html;
                
            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <p>加载失败: ${error.message}</p>
                        <p>请确保访问的是正确的日记链接</p>
                    </div>
                `;
            }
        }
        
        loadContent();
    </script>
</body>
</html>
