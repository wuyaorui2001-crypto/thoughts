<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts - 第二大脑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { opacity: 0.9; font-size: 1.1em; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card h3 { color: #667eea; font-size: 2em; margin-bottom: 5px; }
        .stat-card p { color: #666; font-size: 0.9em; }
        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
        }
        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .sidebar h3 {
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .tag-list { list-style: none; }
        .tag-list li { margin-bottom: 8px; }
        .tag-list a {
            display: block;
            padding: 8px 12px;
            background: #f0f0f0;
            border-radius: 6px;
            text-decoration: none;
            color: #555;
            transition: all 0.3s;
        }
        .tag-list a:hover, .tag-list a.active {
            background: #667eea;
            color: white;
        }
        .content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .entry {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .entry:last-child { border-bottom: none; }
        .entry-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .entry-type {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .entry-title { font-size: 1.2em; font-weight: 600; color: #333; }
        .entry-time { color: #999; font-size: 0.85em; margin-left: auto; }
        .entry-content { color: #555; margin-bottom: 15px; white-space: pre-wrap; }
        .entry-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .entry-tag {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            color: #667eea;
            cursor: pointer;
        }
        .entry-tag:hover { background: #667eea; color: white; }
        .update-time {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar { position: static; }
            header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 Thoughts</h1>
            <p>第二大脑 - 捕获一切想法、灵感与感受</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3>5</h3>
                <p>总条目</p>
            </div>
            <div class="stat-card">
                <h3>14</h3>
                <p>标签数</p>
            </div>
            <div class="stat-card">
                <h3>2</h3>
                <p>记录天数</p>
            </div>
            <div class="stat-card">
                <h3>5</h3>
                <p>本月条目</p>
            </div>
        </div>

        <div class="main-layout">
            <aside class="sidebar">
                <h3>🏷️ 标签</h3>
                <ul class="tag-list" id="tag-list">
<li><a href="#" class="active" data-tag="all">全部</a></li>
                    <li><a href="#" data-tag="AI协作">#AI协作</a></li>
                    <li><a href="#" data-tag="AI项目">#AI项目</a></li>
                    <li><a href="#" data-tag="反思">#反思</a></li>
                    <li><a href="#" data-tag="可迁移性">#可迁移性</a></li>
                    <li><a href="#" data-tag="复盘">#复盘</a></li>
                    <li><a href="#" data-tag="工作流">#工作流</a></li>
                    <li><a href="#" data-tag="待验证">#待验证</a></li>
                    <li><a href="#" data-tag="日记">#日记</a></li>
                    <li><a href="#" data-tag="测试">#测试</a></li>
                    <li><a href="#" data-tag="灵感">#灵感</a></li>
                    <li><a href="#" data-tag="第二大脑">#第二大脑</a></li>
                    <li><a href="#" data-tag="系统设计">#系统设计</a></li>
                    <li><a href="#" data-tag="记忆">#记忆</a></li>
                    <li><a href="#" data-tag="项目">#项目</a></li>
                </ul>
            </aside>

            <main class="content">
                <div id="entries-container">
                    <!-- 条目会在这里渲染 -->
                </div>
                <div class="update-time">
                    最后更新：2026-03-18 14:31:42
                    <br>
                    <small>运行 generate_viewer.py 刷新数据</small>
                </div>
            </main>
        </div>
    </div>

    <script>
        const entries = [
    {
        "type": "灵感",
        "title": "测试想法",
        "full_title": "测试想法",
        "time": "2026-03-18 14:31",
        "content": "这是一条测试想法，用于验证 auto-sync.py 是否正常工作。",
        "tags": [
            "#灵感",
            "#测试",
            "#待验证"
        ]
    },
    {
        "type": "项目",
        "title": "创建第二大脑系统",
        "full_title": "创建第二大脑系统",
        "time": "2026-03-17 16:30",
        "content": "设计一个\"thoughts\"项目，目的是捕获一切想法、灵感、日记、观影感受。\n\n核心需求：\n- 我只需自然输入，AI自动归档\n- 自动打标签，不用我操心\n- 长短不一的内容都能存\n- 可查询、可回顾、可迁移\n\n标签体系：#灵感 #日记 #影片 #书籍 #工作 #学习 #健康 #人际",
        "tags": [
            "#灵感",
            "#第二大脑",
            "#系统设计",
            "#项目"
        ]
    },
    {
        "type": "灵感",
        "title": "AI工作流第一步",
        "full_title": "AI工作流第一步",
        "time": "2026-03-17 17:05",
        "content": "想法记录：和ai建立工作流的第一步，是建立记忆并保证记忆具有可迁移性",
        "tags": [
            "#灵感",
            "#AI协作",
            "#工作流",
            "#可迁移性"
        ]
    },
    {
        "type": "日记",
        "title": "手搓记账与灵感项目",
        "full_title": "手搓记账与灵感项目",
        "time": "2026-03-17 17:30",
        "content": "今天用Claude code手搓了两个项目记账和灵感记录，把我平时需要做的流程更加简化了。",
        "tags": [
            "#日记",
            "#反思",
            "#AI协作",
            "#工作流"
        ]
    },
    {
        "type": "灵感",
        "title": "AI项目可迁移性",
        "full_title": "AI项目可迁移性",
        "time": "2026-03-17 17:35",
        "content": "想法记录：ai项目里面，可迁移性非常重要，尤其是记忆和项目本身的复盘。",
        "tags": [
            "#灵感",
            "#AI项目",
            "#可迁移性",
            "#记忆",
            "#复盘"
        ]
    }
];

        function renderEntries(filterTag = 'all') {
            const container = document.getElementById('entries-container');

            let filtered = entries;
            if (filterTag !== 'all') {
                filtered = entries.filter(e => e.tags.some(t => t.includes('#' + filterTag)));
            }

            container.innerHTML = filtered.map(entry => `
                <article class="entry">
                    <div class="entry-header">
                        <span class="entry-type">${entry.type}</span>
                        <span class="entry-title">${entry.title}</span>
                        <time class="entry-time">${entry.time}</time>
                    </div>
                    <div class="entry-content">${entry.content}</div>
                    <div class="entry-tags">
                        ${entry.tags.map(tag => `<span class="entry-tag">${tag}</span>`).join('')}
                    </div>
                </article>
            `).join('');
        }

        document.getElementById('tag-list').addEventListener('click', (e) => {
            if (e.target.tagName === 'A') {
                e.preventDefault();
                document.querySelectorAll('.tag-list a').forEach(a => a.classList.remove('active'));
                e.target.classList.add('active');
                renderEntries(e.target.dataset.tag);
            }
        });

        renderEntries();
    </script>
</body>
</html>
